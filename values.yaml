projectName: "monitoring"
prometheusVersion: "v2.52.0"
grafanaVersion: "10.4.2"
prometheusPort: 9090
grafanaPort: 3000
retentionTime: "15d"
scrapeInterval: "15s"
evaluationInterval: "15s"
grafanaLogLevel: "warn"
grafanaAllowSignUp: "false"
postgresVersion: "16"
postgresPort: 5432
postgresUser: "grafana"
postgresDb: "grafana"
timezone: "UTC"
sharedBuffers: "128MB"
maxConnections: 100

modules:
  grafana:
    enabled: true
  postgres:
    enabled: false
