projectName: "loki"
lokiVersion: "2.9.8"
promtailVersion: "2.9.8"
grafanaVersion: "10.4.2"
lokiPort: 3100
grafanaPort: 3000
lokiRetentionPeriod: "744h"
grafanaLogLevel: "warn"
grafanaAllowSignUp: "false"
postgresVersion: "16"
postgresPort: 5432
postgresUser: "grafana"
postgresDb: "grafana"
timezone: "UTC"
sharedBuffers: "128MB"
maxConnections: 100

modules:
  promtail:
    enabled: true
  grafana:
    enabled: true
  postgres:
    enabled: false
