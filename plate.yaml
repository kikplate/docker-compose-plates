name: mailpit
owner: kikplate-public
description: Mailpit local SMTP catch-all server with web UI for testing email sending in development environments.
version: 1.0.0
category: dev-tools

tags:
  - mailpit
  - smtp
  - email
  - testing
  - dev-tools
  - docker-compose

schema:
  projectName:
    type: string
    default: mailpit
  mailpitVersion:
    type: string
    default: "v1.18"
  smtpPort:
    type: int
    default: 1025
  webPort:
    type: int
    default: 8025
  maxMessages:
    type: int
    default: 500
  smtpAuthAcceptAny:
    type: string
    default: "false"
  webUiAuthEnabled:
    type: string
    default: "false"

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: README.md
    template: templates/README.md.tmpl
