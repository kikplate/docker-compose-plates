name: mysql
owner: kikplate-public
description: MySQL 8 database with optional phpMyAdmin web interface, persistent named volumes, health checks, and bridge network isolation.
version: 1.0.0
category: database

tags:
  - mysql
  - database
  - phpmyadmin
  - docker-compose

schema:
  projectName:
    type: string
    default: mysql
  mysqlVersion:
    type: string
    default: "8.4"
  mysqlPort:
    type: int
    default: 3306
  phpmyadminPort:
    type: int
    default: 8080

modules:
  phpmyadmin:
    enabled: true

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/mysql/templates/docker-compose.yml.tmpl
  - path: .env.example
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/mysql/templates/.env.example.tmpl
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/mysql/templates/README.md.tmpl
