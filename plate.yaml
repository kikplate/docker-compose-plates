name: redis
owner: kikplate-public
description: Redis 7 in-memory data store with password authentication, AOF persistence, and optional Redis Commander web interface.
version: 1.0.0
category: cache

tags:
  - redis
  - cache
  - in-memory
  - redis-commander
  - docker-compose

schema:
  projectName:
    type: string
    default: redis
  redisVersion:
    type: string
    default: "7"
  redisPort:
    type: int
    default: 6379
  maxMemory:
    type: string
    default: "256mb"
  maxMemoryPolicy:
    type: string
    default: allkeys-lru
  appendOnly:
    type: string
    default: "yes"
  savePolicy:
    type: string
    default: "3600 1 300 100 60 10000"
  redisInsightVersion:
    type: string
    default: "2"
  redisInsightPort:
    type: int
    default: 5540

modules:
  redisInsight:
    enabled: true

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: .env
    template: templates/.env.tmpl
  - path: README.md
    template: templates/README.md.tmpl
