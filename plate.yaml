name: n8n
owner: kikplate-public
description: n8n workflow automation platform. Composes the postgres plate for persistent workflow storage. The postgres module can be disabled when using an external PostgreSQL instance.
version: 1.0.0
category: automation

tags:
  - n8n
  - workflow
  - automation
  - no-code
  - integration
  - docker-compose

schema:
  projectName:
    type: string
    default: n8n
  n8nVersion:
    type: string
    default: "1.47.1"
  postgresVersion:
    type: string
    default: "16"
  n8nPort:
    type: int
    default: 5678
  n8nTimezone:
    type: string
    default: UTC
  n8nHost:
    type: string
    default: localhost
  n8nProtocol:
    type: string
    default: http
  execProcessMode:
    type: string
    default: main
  execTimeout:
    type: int
    default: 3600
  n8nPayloadSizeMax:
    type: int
    default: 16

modules:
  postgres:
    enabled: true

composes:
  - name: postgres
    source: https://github.com/kikplate/docker-compose-plates
    branch: postgres

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: .env
    template: templates/.env.tmpl
  - path: README.md
    template: templates/README.md.tmpl
