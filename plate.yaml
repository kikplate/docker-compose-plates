name: mongodb
owner: kikplate-public
description: MongoDB 7 document database with optional Mongo Express web interface, persistent named volumes, health checks, and bridge network isolation.
version: 1.0.0
category: database

tags:
  - mongodb
  - mongo
  - nosql
  - database
  - mongo-express
  - docker-compose

schema:
  projectName:
    type: string
    default: mongodb
  mongoVersion:
    type: string
    default: "7"
  mongoPort:
    type: int
    default: 27017
  mongoWiredTigerCacheSizeGB:
    type: string
    default: "0.5"
  mongoExpressVersion:
    type: string
    default: "1"
  mongoExpressPort:
    type: int
    default: 8081

modules:
  mongoExpress:
    enabled: true

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: .env
    template: templates/.env.tmpl
  - path: README.md
    template: templates/README.md.tmpl
