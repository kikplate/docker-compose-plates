name: n8n-docker-compose
owner: kikplate-public
description: n8n workflow automation platform. Composes the postgres plate for persistent workflow storage. The postgres module can be disabled when using an external PostgreSQL instance.
version: 1.0.0
category: backend

tags:
  - n8n
  - workflow
  - automation
  - no-code
  - integration
  - docker-compose

schema:
  projectName:
    type: string
    default: n8n
  n8nVersion:
    type: string
    default: "1.47.1"
  postgresVersion:
    type: string
    default: "16"
  postgresPort:
    type: int
    default: 5432
  timezone:
    type: string
    default: UTC
  sharedBuffers:
    type: string
    default: "128MB"
  maxConnections:
    type: int
    default: 100
  n8nPort:
    type: int
    default: 5678
  n8nTimezone:
    type: string
    default: UTC
  n8nHost:
    type: string
    default: localhost
  n8nProtocol:
    type: string
    default: http
  execProcessMode:
    type: string
    default: main
  execTimeout:
    type: int
    default: 3600
  n8nPayloadSizeMax:
    type: int
    default: 16
  redisVersion:
    type: string
    default: "7"
  redisPort:
    type: int
    default: 6379
  maxMemory:
    type: string
    default: "256mb"
  maxMemoryPolicy:
    type: string
    default: allkeys-lru
  appendOnly:
    type: string
    default: "yes"
  savePolicy:
    type: string
    default: "3600 1 300 100 60 10000"

modules:
  postgres:
    enabled: true
  redis:
    enabled: false

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/n8n/templates/docker-compose.yml.tmpl
  - path: docker-compose.postgres.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/postgres/templates/docker-compose.yml.tmpl
    condition: modules.postgres.enabled
  - path: docker-compose.redis.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/redis/templates/docker-compose.yml.tmpl
    condition: modules.redis.enabled
  - path: .env
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/n8n/templates/.env.tmpl
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/n8n/templates/README.md.tmpl
