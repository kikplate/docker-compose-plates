name: nginx-proxy-docker-compose
owner: kikplate-public
description: Nginx reverse proxy with configurable upstream, gzip compression, security headers, health check endpoint, and bridge network isolation.
version: 1.0.0
category: devops
verification_token: e5b5dcee-66e8-4d2a-8a1a-7b84e73698b8

tags:
  - nginx
  - reverse-proxy
  - networking
  - docker-compose

schema:
  projectName:
    type: string
    default: nginx-proxy
  nginxVersion:
    type: string
    default: "1.27-alpine"
  proxyPort:
    type: int
    default: 8080
  upstreamHost:
    type: string
    default: app
  upstreamPort:
    type: int
    default: 3000
  clientMaxBodySize:
    type: string
    default: 16m
  workerProcesses:
    type: string
    default: auto
  workerConnections:
    type: int
    default: 1024
  keepaliveTimeout:
    type: int
    default: 65
  gzipEnabled:
    type: string
    default: "on"
  proxyReadTimeout:
    type: int
    default: 60
  proxySendTimeout:
    type: int
    default: 60

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/nginx-proxy/templates/docker-compose.yml.tmpl
  - path: nginx.conf
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/nginx-proxy/templates/nginx.conf.tmpl
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/nginx-proxy/templates/README.md.tmpl
