name: kafka
owner: kikplate-public
description: Apache Kafka 3 in KRaft mode with optional Kafka UI, persistent named volumes, health checks, and bridge network isolation. No ZooKeeper required.
version: 1.0.0
category: messaging

tags:
  - kafka
  - apache-kafka
  - kraft
  - event-streaming
  - kafka-ui
  - docker-compose

schema:
  projectName:
    type: string
    default: kafka
  kafkaVersion:
    type: string
    default: "3.7"
  kafkaPort:
    type: int
    default: 9092
  kafkaUiPort:
    type: int
    default: 8080

modules:
  kafkaUi:
    enabled: true

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/kafka/templates/docker-compose.yml.tmpl
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/kafka/templates/README.md.tmpl
