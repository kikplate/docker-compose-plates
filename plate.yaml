name: loki-grafana
owner: kikplate-public
description: Grafana Loki log aggregation with optional Promtail agent and optional Grafana dashboards, persistent named volumes, and bridge network isolation.
version: 1.0.0
category: observability

tags:
  - loki
  - promtail
  - grafana
  - logging
  - observability
  - docker-compose

schema:
  projectName:
    type: string
    default: loki
  lokiVersion:
    type: string
    default: "2.9.8"
  grafanaVersion:
    type: string
    default: "10.4.2"
  lokiPort:
    type: int
    default: 3100
  grafanaPort:
    type: int
    default: 3000

modules:
  promtail:
    enabled: true
  grafana:
    enabled: true

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: loki-config.yml
    template: templates/loki-config.yml.tmpl
  - path: promtail-config.yml
    template: templates/promtail-config.yml.tmpl
    condition: modules.promtail.enabled
  - path: .env.example
    template: templates/.env.example.tmpl
    condition: modules.grafana.enabled
  - path: README.md
    template: templates/README.md.tmpl
