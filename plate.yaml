name: vault
owner: kikplate-public
description: HashiCorp Vault secrets management in development mode with a web UI and bridge network isolation.
version: 1.0.0
category: security

tags:
  - vault
  - hashicorp
  - secrets
  - security
  - docker-compose

schema:
  projectName:
    type: string
    default: vault
  vaultVersion:
    type: string
    default: "1.16"
  vaultPort:
    type: int
    default: 8200

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: .env.example
    template: templates/.env.example.tmpl
  - path: README.md
    template: templates/README.md.tmpl
