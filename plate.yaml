name: vault
owner: kikplate-public
description: HashiCorp Vault secrets management in development mode with a web UI and bridge network isolation.
version: 1.0.0
category: security

tags:
  - vault
  - hashicorp
  - secrets
  - security
  - docker-compose

schema:
  projectName:
    type: string
    default: vault
  vaultVersion:
    type: string
    default: "1.16"
  vaultPort:
    type: int
    default: 8200
  vaultLogLevel:
    type: string
    default: info
  vaultUiEnabled:
    type: string
    default: "true"
  vaultMaxLeaseTtl:
    type: string
    default: "768h"
  vaultDefaultLeaseTtl:
    type: string
    default: "768h"

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: .env
    template: templates/.env.tmpl
  - path: README.md
    template: templates/README.md.tmpl
