name: prometheus-grafana
owner: kikplate-public
description: Prometheus metrics collection with optional Grafana dashboards, persistent named volumes, health checks, and bridge network isolation.
version: 1.0.0
category: devops

tags:
  - prometheus
  - grafana
  - monitoring
  - metrics
  - observability
  - docker-compose

schema:
  projectName:
    type: string
    default: monitoring
  prometheusVersion:
    type: string
    default: "v2.52.0"
  grafanaVersion:
    type: string
    default: "10.4.2"
  prometheusPort:
    type: int
    default: 9090
  grafanaPort:
    type: int
    default: 3000
  retentionTime:
    type: string
    default: 15d
  scrapeInterval:
    type: string
    default: "15s"
  evaluationInterval:
    type: string
    default: "15s"
  grafanaLogLevel:
    type: string
    default: warn
  grafanaAllowSignUp:
    type: string
    default: "false"
  postgresVersion:
    type: string
    default: "16"
  postgresPort:
    type: int
    default: 5432
  postgresUser:
    type: string
    default: grafana
  postgresDb:
    type: string
    default: grafana
  timezone:
    type: string
    default: UTC
  sharedBuffers:
    type: string
    default: "128MB"
  maxConnections:
    type: int
    default: 100

modules:
  grafana:
    enabled: true
  postgres:
    enabled: false

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/prometheus-grafana/templates/docker-compose.yml.tmpl
  - path: docker-compose.postgres.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/postgres/templates/docker-compose.yml.tmpl
    condition: modules.postgres.enabled
  - path: prometheus.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/prometheus-grafana/templates/prometheus.yml.tmpl
  - path: .env
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/prometheus-grafana/templates/.env.tmpl
    condition: modules.grafana.enabled
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/prometheus-grafana/templates/README.md.tmpl
