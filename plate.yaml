name: prometheus-grafana
owner: kikplate-public
description: Prometheus metrics collection with optional Grafana dashboards, persistent named volumes, health checks, and bridge network isolation.
version: 1.0.0
category: observability

tags:
  - prometheus
  - grafana
  - monitoring
  - metrics
  - observability
  - docker-compose

schema:
  projectName:
    type: string
    default: monitoring
  prometheusVersion:
    type: string
    default: "v2.52.0"
  grafanaVersion:
    type: string
    default: "10.4.2"
  prometheusPort:
    type: int
    default: 9090
  grafanaPort:
    type: int
    default: 3000
  retentionTime:
    type: string
    default: 15d
  scrapeInterval:
    type: string
    default: "15s"
  evaluationInterval:
    type: string
    default: "15s"
  grafanaLogLevel:
    type: string
    default: warn
  grafanaAllowSignUp:
    type: string
    default: "false"

modules:
  grafana:
    enabled: true

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: prometheus.yml
    template: templates/prometheus.yml.tmpl
  - path: .env
    template: templates/.env.tmpl
    condition: modules.grafana.enabled
  - path: README.md
    template: templates/README.md.tmpl
