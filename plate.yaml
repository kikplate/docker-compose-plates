name: keycloak-docker-compose
owner: kikplate-public
description: Keycloak 24 identity and access management. Composes the postgres plate for its database. The postgres module can be disabled when using an external PostgreSQL instance.
version: 1.0.0
category: security
verification_token: 0a3fc155-2995-46b2-a072-94bf76cf39ea

tags:
  - keycloak
  - iam
  - auth
  - oauth2
  - oidc
  - sso
  - docker-compose

schema:
  projectName:
    type: string
    default: keycloak
  keycloakVersion:
    type: string
    default: "24.0"
  postgresVersion:
    type: string
    default: "16"
  postgresPort:
    type: int
    default: 5432
  timezone:
    type: string
    default: UTC
  sharedBuffers:
    type: string
    default: "128MB"
  maxConnections:
    type: int
    default: 100
  keycloakPort:
    type: int
    default: 8080
  keycloakLogLevel:
    type: string
    default: INFO
  keycloakMetricsEnabled:
    type: string
    default: "true"
  keycloakHealthEnabled:
    type: string
    default: "true"
  keycloakHttpRelativePath:
    type: string
    default: "/"
  pgadminVersion:
    type: string
    default: "8"
  pgadminPort:
    type: int
    default: 5050
  pgadminEmail:
    type: string
    default: admin@example.com

modules:
  postgres:
    enabled: true

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/keycloak/templates/docker-compose.yml.tmpl
  - path: docker-compose.postgres.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/postgres/templates/docker-compose.yml.tmpl
    condition: modules.postgres.enabled
  - path: .env
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/keycloak/templates/.env.tmpl
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/keycloak/templates/README.md.tmpl
