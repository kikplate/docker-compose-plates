name: kafka-docker-compose
owner: kikplate-public
description: Apache Kafka 3 in KRaft mode with optional Kafka UI, persistent named volumes, health checks, and bridge network isolation. No ZooKeeper required.
version: 1.0.0
category: backend
verification_token: 5afc66d7-3e25-4e84-89ee-0c869384b505

tags:
  - kafka
  - apache-kafka
  - kraft
  - event-streaming
  - kafka-ui
  - docker-compose

schema:
  projectName:
    type: string
    default: kafka
  kafkaVersion:
    type: string
    default: "3.7.0"
  kafkaPort:
    type: int
    default: 9092
  kafkaInternalPort:
    type: int
    default: 29092
  kafkaControllerPort:
    type: int
    default: 9093
  kafkaNodeId:
    type: int
    default: 1
  kafkaClusterId:
    type: string
    default: MkU3OEVBNTcwNTJENDM2Qg
  kafkaAutoCreateTopics:
    type: string
    default: "true"
  kafkaLogRetentionHours:
    type: int
    default: 168
  kafkaNumPartitions:
    type: int
    default: 1
  kafkaUiVersion:
    type: string
    default: v0.7.2
  kafkaUiPort:
    type: int
    default: 8080

modules:
  kafkaUi:
    enabled: true

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/kafka/templates/docker-compose.yml.tmpl
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/kafka/templates/README.md.tmpl
