name: wordpress
owner: kikplate-public
description: WordPress CMS. Composes the mysql plate for its database. The mysql module can be disabled when using an external MySQL instance.
version: 1.0.0
category: cms

tags:
  - wordpress
  - cms
  - mysql
  - php
  - docker-compose

schema:
  projectName:
    type: string
    default: wordpress
  wordpressVersion:
    type: string
    default: "6.5-apache"
  mysqlVersion:
    type: string
    default: "8.4"
  wordpressPort:
    type: int
    default: 8080
  wordpressDebug:
    type: string
    default: "false"
  wordpressTablePrefix:
    type: string
    default: wp_
  phpMemoryLimit:
    type: string
    default: 256M
  maxUploadSize:
    type: string
    default: 64M
  wordpressAdminEmail:
    type: string
    default: admin@example.com

modules:
  mysql:
    enabled: true

composes:
  - name: mysql
    source: https://github.com/kikplate/docker-compose-plates
    branch: mysql

files:
  - path: docker-compose.yml
    template: templates/docker-compose.yml.tmpl
  - path: .env
    template: templates/.env.tmpl
  - path: README.md
    template: templates/README.md.tmpl
