name: elk-stack-docker-compose
owner: kikplate-public
description: Elasticsearch Logstash and Kibana 8 stack for log aggregation and search, persistent named volumes, health checks, and bridge network isolation.
version: 1.0.0
category: devops
verification_token: 5d376440-aa32-4dcf-b9fd-1e1efa47a7ed

tags:
  - elasticsearch
  - logstash
  - kibana
  - elk
  - logging
  - observability
  - docker-compose

schema:
  projectName:
    type: string
    default: elk
  elasticVersion:
    type: string
    default: "8.14.0"
  esPort:
    type: int
    default: 9200
  kibanaPort:
    type: int
    default: 5601
  logstashBeatsPort:
    type: int
    default: 5044
  logstashTcpPort:
    type: int
    default: 5000
  esJavaOpts:
    type: string
    default: "-Xms512m -Xmx512m"
  lsJavaOpts:
    type: string
    default: "-Xms256m -Xmx256m"
  esClusterName:
    type: string
    default: docker-cluster
  esReplicaCount:
    type: int
    default: 0

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/elk-stack/templates/docker-compose.yml.tmpl
  - path: logstash.conf
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/elk-stack/templates/logstash.conf.tmpl
  - path: .env
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/elk-stack/templates/.env.tmpl
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/elk-stack/templates/README.md.tmpl
