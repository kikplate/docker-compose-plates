name: rabbitmq-docker-compose
owner: kikplate-public
description: RabbitMQ 3 AMQP message broker with management plugin, persistent named volumes, health checks, and bridge network isolation.
version: 1.0.0
category: backend
verification_token: 937a7b2f-ed0d-4fb6-97ea-25ed1e93ced5

tags:
  - rabbitmq
  - amqp
  - messaging
  - message-broker
  - docker-compose

schema:
  projectName:
    type: string
    default: rabbitmq
  rabbitmqVersion:
    type: string
    default: "3.13"
  amqpPort:
    type: int
    default: 5672
  managementPort:
    type: int
    default: 15672
  rabbitmqVhost:
    type: string
    default: /
  rabbitmqLogLevel:
    type: string
    default: warning
  heartbeat:
    type: int
    default: 60
  consumerTimeout:
    type: int
    default: 1800000

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/rabbitmq/templates/docker-compose.yml.tmpl
  - path: .env
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/rabbitmq/templates/.env.tmpl
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/rabbitmq/templates/README.md.tmpl
