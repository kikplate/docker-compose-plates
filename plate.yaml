name: loki-grafana
owner: kikplate-public
description: Grafana Loki log aggregation with optional Promtail agent and optional Grafana dashboards, persistent named volumes, and bridge network isolation.
version: 1.0.0
category: observability

tags:
  - loki
  - promtail
  - grafana
  - logging
  - observability
  - docker-compose

schema:
  projectName:
    type: string
    default: loki
  lokiVersion:
    type: string
    default: "2.9.8"
  promtailVersion:
    type: string
    default: "2.9.8"
  grafanaVersion:
    type: string
    default: "10.4.2"
  lokiPort:
    type: int
    default: 3100
  grafanaPort:
    type: int
    default: 3000
  lokiRetentionPeriod:
    type: string
    default: "744h"
  grafanaLogLevel:
    type: string
    default: warn
  grafanaAllowSignUp:
    type: string
    default: "false"
  postgresVersion:
    type: string
    default: "16"
  postgresPort:
    type: int
    default: 5432
  postgresUser:
    type: string
    default: grafana
  postgresDb:
    type: string
    default: grafana
  timezone:
    type: string
    default: UTC
  sharedBuffers:
    type: string
    default: "128MB"
  maxConnections:
    type: int
    default: 100

modules:
  promtail:
    enabled: true
  grafana:
    enabled: true
  postgres:
    enabled: false

files:
  - path: docker-compose.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/loki-grafana/templates/docker-compose.yml.tmpl
  - path: docker-compose.postgres.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/postgres/templates/docker-compose.yml.tmpl
    condition: modules.postgres.enabled
  - path: loki-config.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/loki-grafana/templates/loki-config.yml.tmpl
  - path: promtail-config.yml
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/loki-grafana/templates/promtail-config.yml.tmpl
    condition: modules.promtail.enabled
  - path: .env
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/loki-grafana/templates/.env.tmpl
    condition: modules.grafana.enabled
  - path: README.md
    template: https://raw.githubusercontent.com/kikplate/docker-compose-plates/loki-grafana/templates/README.md.tmpl
